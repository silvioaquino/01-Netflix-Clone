<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netiflix Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <nav class="header-nav">
            <div class="logo">
                <h1 class="logo2">NETFLIX</h1>
            </div>
            <div class="btn-header">
                <button class="idioma">Idioma</button>
                <button class="entrar">Entrar</button>
            </div>
            <!-- Menu sanduíche apenas HTML/CSS -->
            <input type="checkbox" id="menu-toggle-css">
            <div class="menu-san">
                <label for="menu-toggle-css" id="menu-icon-css">&#9776;</label>
            </div>
            <nav id="side-menu-css">
                <label for="menu-toggle-css" id="close-menu-css">&times;</label>
                <ul style="list-style:none;padding:60px 0 0 0;margin:0;">
                    <li style="margin-bottom:20px;"><a href="#" style="color:#fff;text-decoration:none;">Início</a></li>
                    <li style="margin-bottom:20px;"><a href="#" style="color:#fff;text-decoration:none;">Séries</a></li>
                    <li style="margin-bottom:20px;"><a href="#" style="color:#fff;text-decoration:none;">Filmes</a></li>
                    <li><a href="#" style="color:#fff;text-decoration:none;">Minha Lista</a></li>
                </ul>
            </nav>
        </nav>
    </header>

    <main class="main">
        <section class="hero">
            <div class="hero-content">
                <h1>Filmes, séries e muito</h1> 
                <h1>mais. Sem limites.</h1>
                <h3>A partir de R$ 20,90. Cancele quando quiser.</h3>
            </div>
            <div class="hero-content2">
                <p>Quer assistir? Informe seu email para criar ou reiniciar sua assinatura.</p>
                <div class="email">
                    <input class="email-input" type="email" placeholder="Email" required>
                    <button class="btn-acao">Vamos lá ></button>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
