<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netiflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
            <nav>
                <div class="logo">
                    <img src="assets/logo.png" alt="Netflix Logo">
                </div>
                <button>Idioma</button>
                <button>entrar</button>    
            </nav>
        </header>
    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Filmes, séries e muito mais. Sem limites.</h1>
                <h2>A partir de R$ 20,90. Cancele quando quiser.</h2>
            </div>
            <div class="hero-content2">
                <p>Quer assistir? Informe seu email para criar ou reiniciar sua assinatura.</p>
                <input type="email" placeholder="Email" style="padding:8px; margin-bottom:8px; width: 250px; max-width: 90%; display: block;" required>
                <button>Vamos lá ></button>
            </div>
        </section>
    </main>
</body>
</html>
